<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>股票資產管理</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="股票管理">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#007aff">
</head>
<body>

<div id="mainView">

  <!-- TopBar -->
  <div class="topbar">
    <span class="topbar-title">股票資產管理</span>
    <button class="add-btn" onclick="openAddStock()">＋</button>
  </div>

  <!-- 股價狀態 -->
  <div class="status-bar">
    <span id="priceStatusText">載入中…</span>
    <button class="refresh-btn" onclick="doRefresh()">重新抓取</button>
  </div>

  <!-- 主表格 -->
  <div class="main-card">
    <div class="table-header">
      <span>股名</span>
      <span class="col-r">股數</span>
      <span class="col-r">總損益</span>
      <span class="col-chev"></span>
    </div>

    <div id="stockRows"></div>

    <!-- 統計列 -->
    <div class="summary-block" id="summaryBlock" style="display:none">
      <div class="summary-row">
        <span class="sum-label">總預估損益</span>
        <span id="totalPL" class="sum-val">—</span>
        <span class="sum-label">總報酬率</span>
        <span id="totalRate" class="sum-val">—</span>
      </div>
      <div class="summary-row">
        <span class="sum-label">總預估現值</span>
        <span id="totalValue" class="sum-val">—</span>
        <span class="sum-label">總成本</span>
        <span id="totalCost" class="sum-val">—</span>
      </div>
    </div>
  </div>

</div>

<!-- ===== 新增股票 Modal ===== -->
<div id="addModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span>新增股票</span>
      <button class="close-btn" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="autocomplete-wrap">
      <input id="asCode" placeholder="股票代號（例：2330）" autocomplete="off" inputmode="numeric">
      <div id="asSuggest" class="suggest-list"></div>
    </div>
    <input id="asName" placeholder="股票名稱（自動帶入）">
    <input id="asQty" type="text"   inputmode="decimal" placeholder="初始股數">
    <input id="asCost" type="number" inputmode="decimal" placeholder="付出成本（含手續費，元）">
    <button class="primary-btn" onclick="submitAddStock()">新增</button>
  </div>
</div>

<!-- ===== 買入 / 賣出 Modal ===== -->
<div id="tradeModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="tradeTitle">買入</span>
      <button class="close-btn" onclick="closeModal('tradeModal')">✕</button>
    </div>
    <div id="tradeFields"></div>
    <button class="primary-btn" onclick="submitTrade()">確認</button>
  </div>
</div>


<!-- ===== 修改交易紀錄 Modal ===== -->
<div id="editTxModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="editTxTitle">修改紀錄</span>
      <button class="close-btn" onclick="closeModal('editTxModal')">✕</button>
    </div>
    <input id="etQty"  type="text"   inputmode="decimal" placeholder="股數">
    <input id="etAmt"  type="number" inputmode="decimal" placeholder="金額（元）">
    <p id="etHint" class="trade-hint"></p>
    <button class="primary-btn" onclick="submitEditTx()">儲存修改</button>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
