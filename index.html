<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <title>資產管理</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="資產管理">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <meta name="theme-color" content="#007aff">
</head>
<body>

<!-- ══ PAGE: 目標 ══ -->
<div id="page-goals" class="page hidden">
  <div class="topbar">
    <span class="topbar-title">目標</span>
    <button class="ghost-btn-sm" onclick="openGoalModal()">新增</button>
  </div>

  <div class="main-card">
    <div id="goalRows">
      <div class="empty-tip">尚未新增目標<br>點右上角「新增」建立</div>
    </div>
  </div>
</div>

<!-- ══ PAGE: 餘額 ══ -->
<div id="page-balance" class="page hidden">
  <div class="topbar">
    <span class="topbar-title">餘額</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="ghost-btn-sm" id="balance-add-btn" onclick="openAddAccount()" style="display:none">＋</button>
      <button class="ghost-btn-sm" id="balance-edit-btn" onclick="toggleBalanceEdit()">編輯</button>
    </div>
  </div>

  <div class="nw-card">
    <div class="nw-label">淨資產</div>
    <div class="nw-value" id="nwValue">$0</div>
  </div>

  <div class="main-card">
    <div id="accountRows"><div class="empty-tip">尚未新增帳戶<br>點右上角「＋」新增</div></div>
  </div>
</div>

<!-- ══ OVERLAY: 帳戶明細 ══ -->
<div id="overlay-account" class="overlay hidden">
  <div class="overlay-topbar">
    <span id="ov-acc-name" class="topbar-title">帳戶</span>
    <button class="danger-text-btn" onclick="deleteCurrentAccount()">刪除</button>
  </div>
  <div class="overlay-body">
    <div class="acc-balance-header">
      <div class="acc-balance-val" id="ov-acc-balance">$0</div>
    </div>
    <div class="acc-action-row">
      <button class="acc-action-btn" onclick="openAddTx('income')">收入</button>
      <button class="acc-action-btn" onclick="openAddTx('expense')">費用</button>
      <button class="acc-action-btn" onclick="openAddTx('transfer')">資金轉帳</button>
    </div>
    <div class="section-label">交易紀錄</div>
    <div id="acc-tx-list"></div>
  </div>
</div>

<!-- ══ PAGE: 股票 ══ -->
<div id="page-stocks" class="page hidden">
  <div class="topbar">
    <span class="topbar-title">股票</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="ghost-btn-sm" id="stocks-add-btn" onclick="openAddStock('stocks')" style="display:none">＋</button>
      <button class="ghost-btn-sm" id="stocks-edit-btn" onclick="toggleStockEdit('stocks')">編輯</button>
    </div>
  </div>
  <div class="status-bar">
    <span id="priceStatusText">載入中…</span>
  </div>
  <div class="main-card">
    <div class="table-header">
      <span>股名</span><span class="col-r">股數</span>
      <span class="col-r">總損益</span><span class="col-chev"></span>
    </div>
    <div id="stocks-rows"></div>
    <div class="summary-block hidden" id="stocks-summary">
      <div class="summary-row">
        <span class="sum-label">總損益</span><span id="stocks-totalPL" class="sum-val">—</span>
        <span class="sep">|</span>
        <span class="sum-label">總報酬率</span><span id="stocks-totalRate" class="sum-val">—</span>
      </div>
      <div class="summary-row">
        <span class="sum-label">總現值</span><span id="stocks-totalValue" class="sum-val">—</span>
        <span class="sep">|</span>
        <span class="sum-label">總成本</span><span id="stocks-totalCost" class="sum-val">—</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: 質押 ══ -->
<div id="page-pledge" class="page hidden">
  <div class="topbar">
    <span class="topbar-title">質押股票</span>
    <div style="display:flex;gap:8px;align-items:center">
      <button class="ghost-btn-sm" id="pledge-add-btn" onclick="openAddStock('pledge')" style="display:none">＋</button>
      <button class="ghost-btn-sm" id="pledge-edit-btn" onclick="toggleStockEdit('pledge')">編輯</button>
    </div>
  </div>
  <div class="status-bar"><span id="pledgeStatusText">—</span></div>
  <div class="main-card">
    <div class="table-header">
      <span>股名</span><span class="col-r">股數</span>
      <span class="col-r">總損益</span><span class="col-chev"></span>
    </div>
    <div id="pledge-rows"></div>
    <div class="summary-block hidden" id="pledge-summary">
      <div class="summary-row">
        <span class="sum-label">總損益</span><span id="pledge-totalPL" class="sum-val">—</span>
        <span class="sep">|</span>
        <span class="sum-label">總報酬率</span><span id="pledge-totalRate" class="sum-val">—</span>
      </div>
      <div class="summary-row">
        <span class="sum-label">總現值</span><span id="pledge-totalValue" class="sum-val">—</span>
        <span class="sep">|</span>
        <span class="sum-label">總成本</span><span id="pledge-totalCost" class="sum-val">—</span>
      </div>
      <div class="summary-row">
        <span class="sum-label">借款金額</span><span id="pledge-loanAmount" class="sum-val">—</span>
      </div>
      <div class="summary-row" id="pledge-loanStatusRow">
        <span class="sum-label" id="pledge-loanStatusLabel">未投入借款</span>
        <span id="pledge-loanStatusValue" class="sum-val">—</span>
      </div>
    </div>
  </div>
</div>

<!-- ══ PAGE: 設定 ══ -->
<div id="page-settings" class="page hidden">
  <div class="topbar">
    <span class="topbar-title">設定</span>
  </div>

  <div class="main-card settings-card">
    <div class="settings-row">
      <label>GitHub Username</label>
      <input id="gh-username" placeholder="例如 github7733a">
    </div>

    <div class="settings-row">
      <label>Repository</label>
      <input id="gh-repo" placeholder="例如 backup">
    </div>

    <div class="settings-row">
      <label>GitHub Token</label>
      <input id="gh-token" type="password" placeholder="github_pat_xxx">
    </div>

    <div class="settings-info">
      <span>最後備份日期</span>
      <div id="github-last-backup">尚未備份</div>
    </div>

    <div class="settings-info auto-backup-box">
      <div class="settings-switch-row">
        <div>
          <div class="settings-switch-title">自動備份</div>
          <div class="settings-switch-sub">開啟 App 時自動檢查</div>
        </div>

        <label class="ios-switch">
          <input id="gh-auto-backup" type="checkbox">
          <span></span>
        </label>
      </div>

      <div class="settings-row auto-days-row">
        <label>備份頻率</label>
        <div class="auto-days-input">
          <span>每</span>
          <input id="gh-backup-days" type="number" min="1" value="3">
          <span>天備份一次</span>
        </div>
      </div>
    </div>

    <button class="primary-btn" onclick="saveGithubSettings()">儲存設定</button>

    <button class="settings-action-btn" onclick="testGithubConnection()">測試連線</button>
    <button class="settings-action-btn" onclick="backupToGithub()">備份到 GitHub</button>
    <button class="settings-danger-btn" onclick="restoreFromGithub()">從 GitHub 還原</button>

    <div id="githubStatus" class="settings-status"></div>
  </div>
</div>

<!-- ══ TAB BAR ══ -->
<nav class="tab-bar">
  <button class="tab" data-tab="goals" onclick="switchTab('goals')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    <span>目標</span>
  </button>
  <button class="tab" data-tab="balance" onclick="switchTab('balance')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
    <span>餘額</span>
  </button>
  <button class="tab" data-tab="stocks" onclick="switchTab('stocks')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,17 9,11 13,15 21,7"/><polyline points="14,7 21,7 21,14"/></svg>
    <span>股票</span>
  </button>
  <button class="tab" data-tab="pledge" onclick="switchTab('pledge')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 12l2 2 4-4"/></svg>
    <span>質押</span>
  </button>
  <button class="tab" data-tab="settings" onclick="switchTab('settings')">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="12" cy="12" r="3"/>
    <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.9 1.7 1.7 0 0 0-1.6-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.9.3 1.7 1.7 0 0 0 1-1.6V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z"/>
  </svg>
  <span>設定</span>
</button>
</nav>

<!-- ══ MODAL: 新增股票（股票 & 質押共用）══ -->
<div id="modal-addStock" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="addStock-title">新增股票</span>
      <button class="close-btn" onclick="closeModal('modal-addStock')">✕</button>
    </div>
    <div class="autocomplete-wrap">
      <input id="asCode" placeholder="股票代號（例：2330）" autocomplete="off" inputmode="numeric">
      <div id="asSuggest" class="suggest-list"></div>
    </div>
    <input id="asName" placeholder="股票名稱（自動帶入）">
    <input id="asQty" type="text" inputmode="decimal" placeholder="初始股數">
    <input id="asCost" type="number" inputmode="decimal" placeholder="付出成本（含手續費，元）">
    <button class="primary-btn" onclick="submitAddStock()">新增</button>
  </div>
</div>

<!-- ══ MODAL: 買入/賣出 ══ -->
<div id="modal-trade" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="trade-title">買入</span>
      <button class="close-btn" onclick="closeModal('modal-trade')">✕</button>
    </div>
    <div id="trade-fields"></div>
    <button class="primary-btn" onclick="submitTrade()">確認</button>
  </div>
</div>

<!-- ══ MODAL: 修改股票交易紀錄 ══ -->
<div id="modal-editTx" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="editTx-title">修改紀錄</span>
      <button class="close-btn" onclick="closeModal('modal-editTx')">✕</button>
    </div>
    <input id="etQty" type="text" inputmode="decimal" placeholder="股數">
    <input id="etAmt" type="number" inputmode="decimal" placeholder="金額（元）">
    <p id="etHint" class="trade-hint"></p>
    <button class="primary-btn" onclick="submitEditTx()">儲存</button>
  </div>
</div>

<!-- ══ MODAL: 新增帳戶 ══ -->
<div id="modal-addAccount" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span>新增帳戶</span>
      <button class="close-btn" onclick="closeModal('modal-addAccount')">✕</button>
    </div>
    <input id="acc-name" placeholder="帳戶名稱（例：銀行存款、房貸）">
    <div class="type-selector">
      <button class="type-btn active" id="acc-type-asset" onclick="selectAccType('asset')">資產</button>
      <button class="type-btn" id="acc-type-liability" onclick="selectAccType('liability')">負債</button>
      <button class="type-btn" id="acc-type-loan" onclick="selectAccType('loan')">借款</button>
    </div>
    <div class="money-input-row">
      <input id="acc-init" type="text" inputmode="decimal" placeholder="初始餘額，可輸入 1000 或 (1000)">
      <button type="button" class="minus-toggle-btn" onclick="toggleAccInitNegative()">−</button>
    </div>
    <button class="primary-btn" onclick="submitAddAccount()">新增</button>
  </div>
</div>

<!-- ══ MODAL: 修改帳戶初始設定 ══ -->
<div id="modal-editAccount" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="edit-account-title">修改初始餘額</span>
      <button class="close-btn" onclick="closeModal('modal-editAccount')">✕</button>
    </div>

    <input id="edit-acc-name" placeholder="帳戶名稱（例：銀行存款、房貸）">

    <div class="type-selector">
      <button class="type-btn active" id="edit-acc-type-asset" onclick="selectEditAccType('asset')">資產</button>
      <button class="type-btn" id="edit-acc-type-liability" onclick="selectEditAccType('liability')">負債</button>
      <button class="type-btn" id="edit-acc-type-loan" onclick="selectEditAccType('loan')">借款</button>
    </div>

    <div class="money-input-row">
      <input id="edit-acc-balance" type="text" inputmode="decimal" placeholder="初始餘額，可輸入 1000 或 (1000)">
      <button type="button" class="minus-toggle-btn" onclick="toggleEditAccNegative()">−</button>
    </div>

    <button class="primary-btn" onclick="submitEditAccountBasic()">儲存</button>
  </div>
</div>

<!-- ══ MODAL: 記帳（收入/費用/資金轉帳）══ -->
<div id="modal-addTx" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="addTx-title">記帳</span>
      <button class="close-btn" onclick="closeModal('modal-addTx')">✕</button>
    </div>
    <div class="type-selector" id="tx-type-row">
      <button class="type-btn active" onclick="selectTxType('income')">收入</button>
      <button class="type-btn"        onclick="selectTxType('expense')">費用</button>
      <button class="type-btn"        onclick="selectTxType('transfer')">資金轉帳</button>
    </div>
    <select id="tx-from-acc" class="modal-select"></select>
    <select id="tx-to-acc"   class="modal-select hidden"></select>
    <select id="tx-category" class="modal-select"></select>
    <input id="tx-amount" type="number" inputmode="decimal" placeholder="金額">
    <input id="tx-note"   placeholder="備註（選填）">
    <button class="primary-btn" onclick="submitAddTx()">儲存</button>
  </div>
</div>

<!-- ══ MODAL: 修改記帳紀錄 ══ -->
<div id="modal-editFinanceTx" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="editFinanceTx-title">修改紀錄</span>
      <button class="close-btn" onclick="closeModal('modal-editFinanceTx')">✕</button>
    </div>

    <div class="type-selector" id="edit-finance-tx-type-row">
      <button class="type-btn active" onclick="selectEditFinanceTxType('income')">收入</button>
      <button class="type-btn" onclick="selectEditFinanceTxType('expense')">費用</button>
      <button class="type-btn" onclick="selectEditFinanceTxType('transfer')">資金轉帳</button>
    </div>

    <select id="edit-tx-from-acc" class="modal-select"></select>
    <select id="edit-tx-to-acc" class="modal-select hidden"></select>
    <input id="edit-tx-amount" type="number" inputmode="decimal" placeholder="金額">
    <input id="edit-tx-note" placeholder="備註（選填）">

    <button class="primary-btn" onclick="submitEditFinanceTx()">儲存</button>
  </div>
</div>

<!-- ══ MODAL: 新增 / 編輯目標 ══ -->
<div id="modal-goal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-header">
      <span id="goal-modal-title">新增目標</span>
      <button class="close-btn" onclick="closeModal('modal-goal')">✕</button>
    </div>

    <input id="goal-name" placeholder="目標名稱，例如：存100萬">
    <input id="goal-target" type="text" inputmode="decimal" placeholder="目標值，可輸入 1000000 或 (100000)">

    <div class="goal-current-box">
      <div class="goal-current-label">目前狀態</div>
      <div class="goal-current-value" id="goal-current-preview">$0</div>
    </div>

    <div class="section-label">計算來源</div>
    <div id="goal-source-list"></div>

    <button class="primary-btn" onclick="submitGoal()">儲存</button>
    <button class="danger-full-btn hidden" id="goal-delete-btn" onclick="deleteGoal()">刪除目標</button>
  </div>
</div>

  <!-- ══ PAGE: 股票總覽 ══ -->
  <div id="page-totalStock" class="page hidden">
    <div class="topbar">
      <span class="topbar-title">股票總覽</span>
    </div>

    <div class="main-card">
      <div class="table-header">
        <span>股名</span>
        <span class="col-r">股數</span>
        <span class="col-r">總損益</span>
        <span class="col-chev"></span>
      </div>

      <div id="totalStockRows"></div>

      <div class="summary-block" id="totalStockSummary"></div>
    </div>
  </div>

  <div class="overlay-body">

    <div class="main-card">

      <div class="table-header">
        <span>股名</span>
        <span class="col-r">股數</span>
        <span class="col-r">總損益</span>
        <span class="col-chev"></span>
      </div>

      <div id="totalStockRows"></div>

      <div class="summary-block" id="totalStockSummary">
      </div>

    </div>

  </div>
</div>

<script src="app.js"></script>
</body>
</html>
